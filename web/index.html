<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo2API</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #475569;
            --shadow: rgba(0, 0, 0, 0.3);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header p {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--shadow);
        }
        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), #a855f7);
            border-radius: 2px;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }
        textarea {
            height: 140px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 12px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-hover), #7c3aed);
            transform: translateY(-1px);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success), #34d399);
            color: white;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, var(--success-hover), #10b981);
        }
        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: var(--bg-input);
            border-color: var(--primary);
        }
        details {
            margin-bottom: 16px;
        }
        summary {
            cursor: pointer;
            color: var(--primary);
            font-size: 14px;
            padding: 8px 0;
            user-select: none;
        }
        summary:hover {
            color: #a855f7;
        }
        details ol {
            margin: 12px 0;
            padding-left: 24px;
            color: var(--text-muted);
            font-size: 14px;
        }
        details li {
            margin: 8px 0;
        }
        details a {
            color: var(--primary);
            text-decoration: none;
        }
        details a:hover {
            text-decoration: underline;
        }
        details code {
            background: var(--bg-input);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
        .status {
            padding: 12px 16px;
            border-radius: 10px;
            margin: 12px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status.success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status.error {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status.loading {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .account-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .account {
            background: var(--bg-input);
            padding: 14px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .account:hover {
            border-color: var(--primary);
        }
        .account-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .account-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }
        .account-id {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
        }
        .empty {
            text-align: center;
            color: var(--text-muted);
            padding: 24px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .header h1 { font-size: 2rem; }
            .card { padding: 20px; }
            .btn-group { flex-direction: column; }
            button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MiMo2API</h1>
            <p>小米 MiMo 模型 OpenAI 兼容 API</p>
        </div>

        <div class="card fade-in">
            <h2>API Keys</h2>
            <div class="input-group">
                <label class="input-label">多个 Key 用逗号分隔</label>
                <input type="text" id="apiKeys" placeholder="sk-key1, sk-key2, sk-key3">
            </div>
            <button class="btn-primary" onclick="saveKeys()">保存配置</button>
        </div>

        <div class="card fade-in" style="animation-delay: 0.1s">
            <h2>添加账号</h2>
            <details>
                <summary>如何获取凭证?</summary>
                <ol>
                    <li>登录 <a href="https://aistudio.xiaomimimo.com" target="_blank">aistudio.xiaomimimo.com</a></li>
                    <li>打开浏览器开发者工具 (F12) → Network 标签</li>
                    <li>发送一条消息，找到 <code>chat</code> 请求</li>
                    <li>右键请求 → Copy as cURL</li>
                    <li>粘贴到下方输入框</li>
                </ol>
            </details>
            <textarea id="curl" placeholder="curl 'https://aistudio.xiaomimimo.com/open-apis/bot/chat...'"></textarea>
            <button class="btn-primary" onclick="parse()">解析 cURL</button>
            <div id="parseResult"></div>
        </div>

        <div class="card fade-in" style="animation-delay: 0.2s">
            <h2>已配置账号</h2>
            <div id="accounts" class="account-list"></div>
        </div>
    </div>

    <script>
        let cfg = { api_keys: '', mimo_accounts: [] }, parsed = null;

        async function load() {
            cfg = await (await fetch('/api/config')).json();
            document.getElementById('apiKeys').value = cfg.api_keys || '';
            render();
        }

        function render() {
            const d = document.getElementById('accounts');
            if (cfg.mimo_accounts?.length) {
                d.innerHTML = cfg.mimo_accounts.map((a, i) => `
                    <div class="account">
                        <div class="account-info">
                            <div class="account-avatar">${a.user_id.slice(-2)}</div>
                            <span class="account-id">ID: ${a.user_id}</span>
                        </div>
                        <button class="btn-danger" onclick="del(${i})">删除</button>
                    </div>
                `).join('');
            } else {
                d.innerHTML = '<div class="empty">暂无配置账号</div>';
            }
        }

        async function saveKeys() {
            cfg.api_keys = document.getElementById('apiKeys').value;
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cfg)
            });
            showStatus('parseResult', 'success', '配置已保存');
            setTimeout(() => document.getElementById('parseResult').innerHTML = '', 2000);
        }

        async function parse() {
            const curl = document.getElementById('curl').value;
            if (!curl.trim()) {
                showStatus('parseResult', 'error', '请输入 cURL 命令');
                return;
            }
            showStatus('parseResult', 'loading', '解析中...');
            const r = await fetch('/api/parse-curl', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ curl })
            });
            if (!r.ok) {
                showStatus('parseResult', 'error', '解析失败，请检查 cURL 格式');
                return;
            }
            parsed = await r.json();
            document.getElementById('parseResult').innerHTML = `
                <div class="status success">解析成功 - ID: ${parsed.user_id}</div>
                <div class="btn-group" style="margin-top: 12px">
                    <button class="btn-outline" onclick="test()">测试连接</button>
                    <button class="btn-success" onclick="save()">添加账号</button>
                </div>
                <div id="testR"></div>
            `;
        }

        async function test() {
            showStatus('testR', 'loading', '测试中...');
            const r = await (await fetch('/api/test-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(parsed)
            })).json();
            if (r.success) {
                showStatus('testR', 'success', '连接成功: ' + r.response.slice(0, 50));
            } else {
                showStatus('testR', 'error', '连接失败: ' + r.error);
            }
        }

        async function save() {
            if (!parsed) return;
            cfg.mimo_accounts = cfg.mimo_accounts || [];
            cfg.mimo_accounts.push(parsed);
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cfg)
            });
            parsed = null;
            document.getElementById('curl').value = '';
            showStatus('parseResult', 'success', '账号已添加');
            load();
        }

        async function del(i) {
            if (!confirm('确定要删除此账号吗?')) return;
            cfg.mimo_accounts.splice(i, 1);
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cfg)
            });
            load();
        }

        function showStatus(id, type, msg) {
            document.getElementById(id).innerHTML = `<div class="status ${type}">${msg}</div>`;
        }

        load();
    </script>
</body>
</html>
